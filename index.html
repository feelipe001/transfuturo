<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo Transfuturo | Live</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --main-blue: #1E4ED8;
            --pure-white: #FFFFFF;
            --live-red: #FF0000;
            --white-glass: rgba(255, 255, 255, 0.1);
            --white-border: rgba(255, 255, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--main-blue);
            color: var(--pure-white);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* HEADER */
        .header {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-top: 10px;
        }

        .logo {
            font-weight: 900;
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        /* STATUS AO VIVO COM CONTADOR */
        .status-live {
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--pure-white);
            padding: 6px 12px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 0.75rem;
            font-weight: 700;
        }

        .dot {
            width: 8px;
            height: 8px;
            background: var(--live-red);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--live-red);
            animation: pulse-red 1.5s infinite;
        }

        #viewer-count {
            font-variant-numeric: tabular-nums;
        }

        /* VÍDEO */
        .video-container {
            width: 100%;
            max-width: 400px;
            border-radius: 24px;
            overflow: hidden;
            border: 2px solid var(--pure-white);
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
            margin-bottom: 30px;
            position: relative;
            background: #000;
        }

        video {
            width: 100%;
            display: block;
        }

        /* LINKS */
        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            background: var(--white-glass);
            border: 1px solid var(--white-border);
            padding: 18px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--pure-white);
            transition: 0.3s ease;
            backdrop-filter: blur(10px);
        }

        .link-card:active {
            background: var(--pure-white);
            color: var(--main-blue);
            transform: scale(0.98);
        }

        .icon {
            font-size: 1.3rem;
            margin-right: 15px;
            width: 30px;
            text-align: center;
        }

        .text b {
            display: block;
            font-size: 0.9rem;
            text-transform: uppercase;
        }

        .text span {
            font-size: 0.75rem;
            opacity: 0.8;
        }

        /* BOTÃO DESTAQUE */
        .highlight {
            border: 2px solid var(--pure-white);
            background: rgba(255, 255, 255, 0.15);
        }

        @keyframes pulse-red {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }

        .footer {
            margin-top: auto;
            padding: 30px 0;
            font-size: 0.6rem;
            letter-spacing: 2px;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">TRANSFUTURO</div>
        <div class="status-live">
            <div class="dot"></div>
            AO VIVO: <span id="viewer-count">87</span>
        </div>
    </header>

    <div class="video-container">
        <video id="mainVideo" autoplay loop playsinline>
            <source src="https://res.cloudinary.com/dxpygpngo/video/upload/q_auto/f_auto/v1776262042/0415_1_n3ys1a.mp4" type="video/mp4">
        </video>
    </div>

    <div class="container">
        <a href="https://wa.me/SEUNUMERO" class="link-card highlight">
            <div class="icon"><i class="fab fa-whatsapp"></i></div>
            <div class="text">
                <b>Atendimento Comercial</b>
                <span>Fale com um consultor agora</span>
            </div>
        </a>

        <a href="#" class="link-card">
            <div class="icon"><i class="fas fa-truck"></i></div>
            <div class="text">
                <b>Veículos Disponíveis</b>
                <span>Confira nosso estoque</span>
            </div>
        </a>

        <a href="#" class="link-card">
            <div class="icon"><i class="fas fa-box-open"></i></div>
            <div class="text">
                <b>Serviços Logísticos</b>
                <span>Soluções para sua carga</span>
            </div>
        </a>
    </div>

    <footer class="footer">
        © 2026 GRUPO TRANSFUTURO
    </footer>

    <script>
        // CONTADOR DE PESSOAS DINÂMICO (50 a 120)
        const viewerElement = document.getElementById('viewer-count');
        let currentViewers = Math.floor(Math.random() * (120 - 50 + 1)) + 50;

        function updateViewers() {
            // Sorteia se sobe ou desce (-3 a +3)
            const change = Math.floor(Math.random() * 7) - 3;
            currentViewers += change;

            // Mantém dentro do limite de 50 a 120
            if (currentViewers < 50) currentViewers = 55;
            if (currentViewers > 120) currentViewers = 115;

            viewerElement.innerText = currentViewers;
        }

        // Atualiza a cada 3 a 5 segundos
        setInterval(updateViewers, 3500);

        // Tentativa de forçar o play com som (necessário interação do usuário as vezes)
        document.body.addEventListener('click', function() {
            const video = document.getElementById('mainVideo');
            if (video.paused) video.play();
        }, { once: true });
    </script>

</body>
</html>
