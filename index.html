<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo Transfuturo | Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* PALETA RESTRITA: APENAS AZUL (#1E4ED8) E BRANCO (#FFFFFF) */
        :root {
            --main-blue: #1E4ED8;
            --pure-white: #FFFFFF;
            --white-glass: rgba(255, 255, 255, 0.1);
            --white-border: rgba(255, 255, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--main-blue); /* Fundo sólido Azul */
            color: var(--pure-white);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* HEADER */
        .header {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-top: 10px;
        }

        .logo {
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .status {
            font-size: 0.7rem;
            font-weight: 600;
            border: 1px solid var(--pure-white);
            padding: 5px 12px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .status span {
            width: 6px;
            height: 6px;
            background: var(--pure-white);
            border-radius: 50%;
            box-shadow: 0 0 8px var(--pure-white);
            animation: pulse 1.5s infinite;
        }

        /* VÍDEO */
        .video-box {
            width: 100%;
            max-width: 400px;
            border-radius: 24px;
            overflow: hidden;
            border: 2px solid var(--pure-white); /* Borda branca sólida */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
        }

        video {
            width: 100%;
            display: block;
        }

        /* LINKS */
        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            background: var(--white-glass);
            border: 1px solid var(--white-border);
            padding: 20px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--pure-white);
            transition: 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .link-card:active {
            transform: scale(0.98);
            background: var(--pure-white);
            color: var(--main-blue);
        }

        /* No Desktop o hover funciona, no mobile o feedback é no toque */
        @media (min-width: 768px) {
            .link-card:hover {
                background: var(--pure-white);
                color: var(--main-blue);
            }
        }

        .icon {
            font-size: 1.4rem;
            margin-right: 20px;
            width: 24px;
            text-align: center;
        }

        .text b {
            display: block;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .text span {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        /* WHATSAPP COM DESTAQUE (BORDA MAIS GROSSA) */
        .highlight {
            border: 2px solid var(--pure-white);
            background: rgba(255, 255, 255, 0.2);
        }

        /* FOOTER */
        .footer {
            margin-top: auto;
            padding: 40px 0;
            font-size: 0.7rem;
            font-weight: 700;
            opacity: 0.6;
            letter-spacing: 2px;
        }

        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.3; }
            100% { opacity: 1; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">TRANSFUTURO</div>
        <div class="status"><span></span> AO VIVO</div>
    </header>

    <div class="video-box">
        <video autoplay muted loop playsinline>
            <source src="https://res.cloudinary.com/dxpygpngo/video/upload/q_auto/f_auto/v1776262042/0415_1_n3ys1a.mp4" type="video/mp4">
        </video>
    </div>

    <div class="container">
        <a href="https://wa.me/SEUNUMERO" class="link-card highlight">
            <div class="icon"><i class="fab fa-whatsapp"></i></div>
            <div class="text">
                <b>Atendimento Direto</b>
                <span>Fale com nossos consultores agora</span>
            </div>
        </a>

        <a href="#" class="link-card">
            <div class="icon"><i class="fas fa-truck"></i></div>
            <div class="text">
                <b>Veículos Iveco</b>
                <span>Novos e Seminovos</span>
            </div>
        </a>

        <a href="#" class="link-card">
            <div class="icon"><i class="fas fa-route"></i></div>
            <div class="text">
                <b>Soluções Logísticas</b>
                <span>Gestão inteligente de cargas</span>
            </div>
        </a>

        <a href="#" class="link-card">
            <div class="icon"><i class="fas fa-tools"></i></div>
            <div class="text">
                <b>Truck Center</b>
                <span>Peças e Manutenção Veibam</span>
            </div>
        </a>
    </div>

    <footer class="footer">
        GRUPO TRANSFUTURO © 2026
    </footer>

</body>
</html>
