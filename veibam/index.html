<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grupo Transfuturo | Links</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* PALETA RESTRITA: APENAS AZUL (#1E4ED8) E BRANCO (#FFFFFF) */
        :root {
            --main-blue: #1E4ED8;
            --pure-white: #FFFFFF;
            --live-red: #FF0000; /* Cor para o ponto de Live */
            --white-glass: rgba(255, 255, 255, 0.1);
            --white-border: rgba(255, 255, 255, 0.3);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background-color: var(--main-blue); /* Fundo sólido Azul */
            color: var(--pure-white);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        /* HEADER */
        .header {
            width: 100%;
            max-width: 400px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-top: 10px;
        }

        .logo {
            font-weight: 900;
            font-size: 1.2rem;
            letter-spacing: 1px;
        }

        .status {
            font-size: 0.7rem;
            font-weight: 600;
            border: 1px solid var(--pure-white);
            padding: 5px 12px;
            border-radius: 50px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        /* PONTO PULSANTE VERMELHO */
        .status span {
            width: 7px;
            height: 7px;
            background: var(--live-red);
            border-radius: 50%;
            box-shadow: 0 0 10px var(--live-red);
            animation: pulse-red 1.5s infinite;
        }

        /* VÍDEO */
        .video-box {
            width: 100%;
            max-width: 400px;
            border-radius: 24px;
            overflow: hidden;
            border: 2px solid var(--pure-white); /* Borda branca sólida */
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
            margin-bottom: 30px;
            position: relative; /* Necessário para posicionar o aviso */
            background: #000;
        }

        video {
            width: 100%;
            display: block;
        }

        /* AVISO PARA ATIVAR SOM */
        .sound-badge {
            position: absolute;
            bottom: 15px;
            right: 15px;
            background: rgba(0, 0, 0, 0.6);
            color: var(--pure-white);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.65rem;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            pointer-events: none; /* Garante que o clique passe para o body */
            z-index: 10;
        }

        /* LINKS */
        .container {
            width: 100%;
            max-width: 400px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .link-card {
            background: var(--white-glass);
            border: 1px solid var(--white-border);
            padding: 20px;
            border-radius: 18px;
            display: flex;
            align-items: center;
            text-decoration: none;
            color: var(--pure-white);
            transition: 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .link-card:active {
            transform: scale(0.98);
            background: var(--pure-white);
            color: var(--main-blue);
        }

        @media (min-width: 768px) {
            .link-card:hover {
                background: var(--pure-white);
                color: var(--main-blue);
            }
        }

        .icon {
            font-size: 1.4rem;
            margin-right: 20px;
            width: 24px;
            text-align: center;
        }

        .text b {
            display: block;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .text span {
            font-size: 0.8rem;
            opacity: 0.8;
        }

        .highlight {
            border: 2px solid var(--pure-white);
            background: rgba(255, 255, 255, 0.2);
        }

        /* FOOTER */
        .footer {
            margin-top: auto;
            padding: 40px 0;
            font-size: 0.7rem;
            font-weight: 700;
            opacity: 0.6;
            letter-spacing: 2px;
        }

        @keyframes pulse-red {
            0% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.3); opacity: 0.6; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

    <header class="header">
        <div class="logo">VEIBAM</div>
        <div class="status">
            <span></span>ASSISTINDO: <b id="contador">87</b>
        </div>
    </header>

    <div class="video-box">
        <video id="meuVideo" autoplay loop muted playsinline>
            <source src="https://res.cloudinary.com/dxpygpngo/video/upload/q_auto/f_auto/v1776262042/0415_1_n3ys1a.mp4" type="video/mp4">
        </video>
        <div class="sound-badge" id="badgeSom">
            <i class="fas fa-volume-mute"></i> TOQUE PARA OUVIR
        </div>
    </div>

    <div class="container">
        <a href="https://wa.me/SEUNUMERO" class="link-card highlight">
            <div class="icon"><i class="fab fa-whatsapp"></i></div>
            <div class="text">
                <b>Atendimento Direto</b>
                <span>Fale com nossos consultores agora</span>
            </div>
        </a>

        <a href="#" class="link-card">
            <div class="icon"><i class="fas fa-tools"></i></div>
            <div class="text">
                <b>Truck Center</b>
                <span>Peças e Manutenção Veibam</span>
            </div>
        </a>
        
        <a href="#" class="link-card">
            <div class="icon"><i class="fas fa-truck"></i></div>
            <div class="text">
                <b>Vacina Contra Roubo</b>
                <span>Proteja o seu pesado</span>
            </div>
        </a>

        <a href="#" class="link-card">
            <div class="icon"><i class="fas fa-truck"></i></div>
            <div class="text">
                <b>Veículos Iveco</b>
                <span>Novos e Seminovos</span>
            </div>
        </a>

        <a href="#" class="link-card">
            <div class="icon"><i class="fas fa-route"></i></div>
            <div class="text">
                <b>Soluções Logísticas</b>
                <span>Gestão inteligente de cargas</span>
            </div>
        </a>
    </div>

    <footer class="footer">
        GRUPO TRANSFUTURO © 2026
    </footer>

    <script>
        // Lógica do contador de pessoas (50 a 120)
        const contadorElemento = document.getElementById('contador');
        const badgeSom = document.getElementById('badgeSom');
        let viewers = Math.floor(Math.random() * (120 - 50 + 1)) + 50;

        function atualizarContador() {
            const mudanca = Math.floor(Math.random() * 7) - 3;
            viewers += mudanca;
            if (viewers < 50) viewers = 55;
            if (viewers > 120) viewers = 115;
            contadorElemento.innerText = viewers;
        }

        setInterval(atualizarContador, 3000);

        // Lógica para ativar o som, REINICIAR o vídeo e esconder a frase no primeiro toque
        document.body.addEventListener('click', function() {
            const video = document.getElementById('meuVideo');
            if (video.muted) {
                video.muted = false;
                video.currentTime = 0; // REINICIA DO COMEÇO
                video.play();
                badgeSom.style.display = 'none'; // ESCONDE A FRASE
            }
        }, { once: true });
    </script>

</body>
</html>
